<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Digital - YSP 23</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lateef&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .font-arabic { font-family: 'Amiri', serif; font-size: 2.2rem; line-height: 4rem; }
        .bg-pgri { background: linear-gradient(180deg, #1e40af 0%, #1e3a8a 100%); }
        .card-surah:hover { transform: translateY(-3px); transition: 0.3s; cursor: pointer; border-color: #3b82f6; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-pgri text-white p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
               <img src="https://upload.wikimedia.org/wikipedia/id/thumb/a/a2/Logo_Nahdlatul_Ulama.svg/800px-Logo_Nahdlatul_Ulama.svg.png" 
     alt="Logo NU" 
     style="width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));">
                <div>
                    <h1 class="font-bold text-xl uppercase tracking-tighter">Al-Qur'an Digital</h1>
                    <p class="text-xs text-blue-200">Ysp23</p>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-white/10 hover:bg-white/20 p-2 rounded-full px-4 text-sm">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6">
        
        <div id="container-surat" class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="col-span-full flex flex-col items-center py-20">
                <div class="loading-spinner mb-4"></div>
                <p class="text-gray-500">Memuat Daftar Surat...</p>
            </div>
        </div>

        <div id="container-baca" class="hidden">
            <button onclick="tutupBaca()" class="mb-6 text-blue-700 font-bold flex items-center gap-2 hover:underline">
                <i class="fas fa-arrow-left"></i> Kembali ke Daftar Surat
            </button>
            
            <div id="header-surat" class="bg-white p-8 rounded-2xl shadow-sm text-center border-b-4 border-blue-600 mb-6">
                </div>

            <div id="isi-ayat" class="space-y-6">
                </div>
        </div>

    </main>

    <script>
        const containerSurat = document.getElementById('container-surat');
        const containerBaca = document.getElementById('container-baca');
        const isiAyat = document.getElementById('isi-ayat');
        const headerSurat = document.getElementById('header-surat');

        // 1. Fungsi Ambil Daftar Surat
        async function getSurat() {
            try {
                const response = await fetch('https://equran.id/api/v2/surat');
                const data = await response.json();
                renderSurat(data.data);
            } catch (error) {
                containerSurat.innerHTML = `<p class="text-red-500 col-span-full text-center">Gagal memuat data. Periksa koneksi internet.</p>`;
            }
        }

        // 2. Tampilkan Daftar Surat ke Layar
        function renderSurat(daftarSurat) {
            containerSurat.innerHTML = '';
            daftarSurat.forEach(s => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl border border-gray-200 shadow-sm card-surah flex justify-between items-center";
                card.onclick = () => bacaSurat(s.nomor);
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-100 text-blue-700 flex items-center justify-center rounded-lg font-bold">
                            ${s.nomor}
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-800">${s.namaLatin}</h3>
                            <p class="text-xs text-gray-500">${s.arti} (${s.jumlahAyat} Ayat)</p>
                        </div>
                    </div>
                    <div class="font-arabic text-2xl text-blue-900">${s.nama}</div>
                `;
                containerSurat.appendChild(card);
            });
        }

        // 3. Fungsi Ambil Detail Ayat (Baca Surat)
        async function bacaSurat(nomor) {
            containerSurat.classList.add('hidden');
            containerBaca.classList.remove('hidden');
            isiAyat.innerHTML = '<div class="text-center py-10"><div class="loading-spinner mx-auto"></div></div>';
            window.scrollTo(0,0);

            try {
                const response = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
                const resJson = await response.json();
                const data = resJson.data;

                // Set Header
                headerSurat.innerHTML = `
                    <h2 class="text-3xl font-bold text-blue-900 mb-2">${data.namaLatin}</h2>
                    <p class="text-gray-500 mb-4">${data.arti} • ${data.tempatTurun} • ${data.jumlahAyat} Ayat</p>
                    <audio controls class="mx-auto h-10">
                        <source src="${data.audioFull['05']}" type="audio/mpeg">
                        Browser anda tidak mendukung audio.
                    </audio>
                `;

                // Render Ayat
                isiAyat.innerHTML = '';
                data.ayat.forEach(a => {
                    const boxAyat = document.createElement('div');
                    boxAyat.className = "bg-white p-8 rounded-xl shadow-sm border-r-4 border-blue-500";
                    boxAyat.innerHTML = `
                        <div class="flex justify-between items-start mb-6">
                            <span class="w-8 h-8 bg-gray-800 text-white rounded-full flex items-center justify-center text-xs">
                                ${a.nomorAyat}
                            </span>
                            <p class="font-arabic text-right leading-loose flex-1" dir="rtl">
                                ${a.teksArab}
                            </p>
                        </div>
                        <p class="text-gray-600 text-sm italic border-t pt-4">${a.teksIndonesia}</p>
                    `;
                    isiAyat.appendChild(boxAyat);
                });

            } catch (error) {
                isiAyat.innerHTML = `<p class="text-red-500 text-center">Gagal memuat ayat.</p>`;
            }
        }

        function tutupBaca() {
            containerBaca.classList.add('hidden');
            containerSurat.classList.remove('hidden');
        }

        // Jalankan saat halaman dibuka
        getSurat();
    </script>
</body>
</html>
